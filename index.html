<!DOCTYPE html>
<html>
<head>
    <title>X200 PRO DIAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
    body { 
    background: #121212; 
    color: #00ff00; 
    margin: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    width: 100vw;
    font-family: monospace;
    overflow: hidden; /* Prevents the whole page from scrolling */
}

#data-block { 
    height: 60px; 
    background: #1a1a1a; 
    border-bottom: 2px solid #00ff00; 
    display: flex;
    justify-content: space-around;
    align-items: center;
    font-size: 12px;
}

#log { 
    flex: 1; /* This grows to fill the middle */
    overflow-y: scroll; 
    padding: 10px; 
    font-size: 14px;
    background: #000;
}

.controls { 
    height: 100px; /* Big enough to see over browser bars */
    display: grid; 
    grid-template-columns: 1fr 1fr 1fr; 
    gap: 10px; 
    padding: 10px; 
    background: #1a1a1a;
    border-top: 1px solid #333;
}

button { 
    background: #333; 
    color: #fff; 
    border: 2px solid #00ff00; 
    font-size: 18px; 
    font-weight: bold;
    border-radius: 8px;
}

#term-panel { 
    position: absolute; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 40%; 
    background: #000; 
    border-bottom: 2px solid #00ff00; 
    display: none; /* Hidden until you tap >_ */
    z-index: 999;
} 
        
        
    </style>
</head>
<body>

<div id="data-block">
    <div class="grid">
        <div class="stat">TEMP: <span id="v-temp" class="val">--</span></div>
        <div class="stat">BATT: <span id="v-batt" class="val">--</span></div>
        <div class="stat">RAIL: <span id="v-rail" class="val">--</span></div>
        <div class="stat">RPM: <span id="v-rpm" class="val">--</span></div>
    </div>
</div>

<div id="log">READY... TAP PREP TO START</div>

<div id="term-panel">
    <div style="padding: 10px; display: flex; justify-content: space-between;">
        <input type="text" id="term-input" placeholder="HEX CMD (e.g. 27 03)">
        <button class="term-btn" onclick="sendManual()">SEND</button>
    </div>
</div>

<div class="controls">
    <button onclick="prepECU()" style="background:#004400">1. PREP</button>
    <button onclick="togglePIDs()" id="pid-btn">2. PIDs</button>
    <button onclick="toggleTerm()">3. >_</button>
</div>

<script>
let port, reader, writer;
let heartbeat;
let pidLoop;

async function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

async function send(cmd) {
    if (!port) return "ERROR";
    const encoder = new TextEncoder();
    await writer.write(encoder.encode(cmd + "\r"));
    await new Promise(r => setTimeout(r, 200)); // Crucial wait for ECU
    return "SENT";
}

async function prepECU() {
    try {
        if (!port) {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 38400 });
            writer = port.writable.getWriter();
            reader = port.readable.getReader();
            readLoop();
        }
        log("CONNECTING...");
        await send("ATZ");
        await new Promise(r => setTimeout(r, 500));
        await send("27 01");
        await send("27 02 AA 55"); // The "Front Door" key
        log("ECU UNLOCKED & ALIVE");
        
        // Start Heartbeat (Keep-Alive)
        if (heartbeat) clearInterval(heartbeat);
        heartbeat = setInterval(() => send("3E 00"), 3000); 
    } catch (e) { log("ERR: " + e); }
}

function decode0105(hex) {
    // Basic logic for Great Wall DCM3.7 Multi-packet
    if (!hex.includes("62 01 05")) return;
    const bytes = hex.split(' ');
    const tempHex = bytes[3]; // Byte after 01 05
    if (tempHex) {
        let temp = parseInt(tempHex, 16) - 40;
        document.getElementById('v-temp').innerText = temp + "°C";
    }
    // Note: Rail pressure and RPM change positions in multi-packet strings
    // We update these once the car starts cranking.
}

async function togglePIDs() {
    const btn = document.getElementById('pid-btn');
    const block = document.getElementById('data-block');
    if (pidLoop) {
        clearInterval(pidLoop);
        pidLoop = null;
        btn.innerText = "2. PIDs";
        block.style.display = "none";
    } else {
        block.style.display = "block";
        btn.innerText = "STOP";
        pidLoop = setInterval(() => send("22 01 05"), 1000);
    }
}

function toggleTerm() {
    document.getElementById('term-panel').classList.toggle('open');
}

async function sendManual() {
    let cmd = document.
