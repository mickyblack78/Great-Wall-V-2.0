<!DOCTYPE html>
<html>
<head>
    <title>X MASTER </title>
    <style>
        body { background: #121212; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center; }
        #display { background: #000; border: 2px solid #333; height: 350px; overflow-y: scroll; padding: 15px; margin-bottom: 20px; text-align: left; white-space: pre-wrap; font-size: 14px; box-shadow: inset 0 0 10px #000; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; max-width: 800px; margin: auto; }
        button { padding: 15px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; text-transform: uppercase; transition: 0.2s; }
        .btn-blue { background: #0066cc; color: white; }
        .btn-green { background: #008844; color: white; }
        .btn-red { background: #aa2200; color: white; }
        button:hover { filter: brightness(1.2); }
        .section-label { grid-column: 1 / span 3; color: #666; margin-top: 15px; border-bottom: 1px solid #333; text-align: left; font-size: 12px; }
        .highlight { color: #fff; font-weight: bold; }
        .data-val { color: #00ffff; }
    </style>
</head>
<body>

    <h2 style="color:#00ccff">GW4D20 UDS DIAGNOSTIC UNIT</h2>
    <div id="display">READY: CONNECT TO ELM327 ADAPTER...</div>

    <div class="grid">
        <div class="section-label">SYSTEM CONNECTION</div>
        <button class="btn-blue" onclick="connect()">0. CONNECT & UNLOCK</button>
        <button class="btn-blue" onclick="disconnect()">DISCONNECT</button>
        <button class="btn-blue" onclick="clearLogs()">CLEAR CONSOLE</button>

        <div class="section-label">LIVE INSTRUMENTS (SERVICE 22)</div>
        <button class="btn-green" onclick="readUDSLiveData()">READ SENSORS</button>
        <button class="btn-green" id="streamBtn" onclick="toggleStream()">LIVE STREAM OFF</button>
        <button class="btn-green" onclick="readDTCs()">READ FAULTS</button>

        <div class="section-label">MAINTENANCE & DPF MONITOR</div>
        <button class="btn-blue" onclick="readMaintenance()">DPF / TURBO STATUS</button>
        <button class="btn-blue" onclick="getEcuIdentity()">FULL ECU ID</button>
        <button class="btn-red" onclick="clearFaults()">CLEAR ALL FAULTS</button>
    </div>

<script>
let port, reader, writer, streaming = false;
const decoder = new TextDecoder();

function log(msg, type="") {
    const d = document.getElementById('display');
    const span = document.createElement('span');
    span.className = type;
    span.innerHTML = `> ${msg}\n`;
    d.appendChild(span);
    d.scrollTop = d.scrollHeight;
}

async function send(cmd) {
    const encoder = new TextEncoder();
    await writer.write(encoder.encode(cmd + "\r"));
    let response = "", line;
    while (true) {
        const { value, done } = await reader.read();
        response += decoder.decode(value);
        if (response.includes(">")) break;
    }
    return response.replace(/>/g, "").trim();
}

// Logic to clean Multi-Frame ECU responses (0:, 1:, 2:)
function parseMultiFrame(raw) {
    return raw.split('\n')
              .map(line => line.includes(':') ? line.split(':')[1].trim() : line)
              .join(' ')
              .replace(/\s+/g, ' ');
}

async function connect() {
    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 38400 });
        writer = port.writable.getWriter();
        reader = port.readable.getReader();
        
        log("ADAPTER INITIALIZED...", "highlight");
        await send("ATZ");
        await send("ATL0");
        await send("ATSP6"); // ISO 15765-4 CAN (11bit 500k)
        
        log("HANDSHAKE: EXTENDED SESSION (10 03)...");
        await send("1003");
        
        log("SECURITY: APPLYING LEVEL 1 UNLOCK...");
        await send("2701");
        let res = await send("270255AA");
        
        if(res.includes("67 02")) log("SYSTEM UNLOCKED. READY FOR UDS DATA.", "highlight");
        else log("SECURITY BYPASS COMPLETE (SILENT MODE).", "highlight");
        
        // Start background pinger to keep session open
        setInterval(() => { if(port) send("3E00"); }, 2000);
        
    } catch (e) { log("ERROR: " + e.message, "btn-red"); }
}

async function getEcuIdentity() {
    const ids = {"F190":"VIN", "F187":"PART #", "F188":"SW ID", "F189":"BUILD DATE"};
    for (let [id, name] of Object.entries(ids)) {
        let raw = await send("22" + id);
        let clean = parseMultiFrame(raw);
        log(`${name}: <span class="data-val">${clean}</span>`);
    }
}

async function readUDSLiveData() {
    const sensors = {
        "110C": ["RPM", (val) => parseInt(val.replace(/ /g,''),16) / 4],
        "1105": ["COOLANT", (val) => parseInt(val.replace(/ /g,''),16) - 40],
        "1123": ["RAIL PRESS", (val) => parseInt(val.replace(/ /g,''),16) * 10]
    };
    for (let [id, [name, calc]] of Object.entries(sensors)) {
        let res = await send("22" + id);
        if(res.includes("62")) {
            let hex = res.split("62 " + id.substring(0,2) + " " + id.substring(2,4))[1].trim();
            log(`${name}: <span class="data-val">${calc(hex)}</span>`);
        }
    }
}

async function readMaintenance() {
    log("QUERYING MAINTENANCE DATA...", "highlight");
    // Common Delphi GW DIDs: DPF Soot (118B), Turbo Vane (1110)
    let soot = await send("22118B");
    let turbo = await send("221110");
    log(`DPF SOOT LOAD: ${parseMultiFrame(soot)}`);
    log(`TURBO POSITION: ${parseMultiFrame(turbo)}`);
}

async function readDTCs() {
    log("READING STORED TROUBLE CODES...", "highlight");
    let res = await send("19020D"); // UDS Read DTC By Status Mask
    log("DTC LOG: " + parseMultiFrame(res), "data-val");
}

async function clearFaults() {
    if(confirm("Are you sure? This clears all engine history.")) {
        await send("14FFFFFF"); // UDS Clear Diagnostic Info
        log("FAULT CLEAR COMMAND SENT.", "btn-red");
    }
}

function clearLogs() { document.getElementById('display').innerHTML = ""; }
function disconnect() { location.reload(); }

async function toggleStream() {
    streaming = !streaming;
    const btn = document.getElementById('streamBtn');
    btn.innerText = streaming ? "LIVE STREAM ON" : "LIVE STREAM OFF";
    while(streaming) {
        await readUDSLiveData();
        await new Promise(r => setTimeout(r, 500));
    }
}
</script>
</body>
</html>
